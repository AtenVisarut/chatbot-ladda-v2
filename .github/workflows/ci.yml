name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  # Dummy env vars so the app can import without real credentials
  OPENAI_API_KEY: "sk-test-dummy"
  SUPABASE_URL: "https://test.supabase.co"
  SUPABASE_KEY: "eyJ-test-dummy"
  LINE_CHANNEL_ACCESS_TOKEN: "test-dummy"
  LINE_CHANNEL_SECRET: "test-dummy"
  FB_PAGE_ACCESS_TOKEN: "test-dummy"
  FB_VERIFY_TOKEN: "test-dummy"
  FB_APP_SECRET: "test-dummy"
  SECRET_KEY: "ci-test-secret-key"
  ADMIN_PASSWORD: "ci-test-password"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff==0.8.6
      - run: ruff check app/ --output-format=github

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short --co -q 2>/dev/null; pytest tests/ -v --tb=short

      - name: Run tests with coverage
        run: pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=10

  import-check:
    name: Import Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify all modules import cleanly
        run: |
          python -c "from app.config import *; print('config OK')"
          python -c "from app.models import *; print('models OK')" 2>/dev/null || true
          python -c "from app.services.rag import *; print('rag OK')"
          python -c "from app.services.product.registry import ProductRegistry; print('registry OK')"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, import-check]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t chatbot-ladda:ci-${{ github.sha }} .
