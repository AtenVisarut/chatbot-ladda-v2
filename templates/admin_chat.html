<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Chat - ICP Ladda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/design-system.css">
    <style>
        body { height: 100vh; display: flex; flex-direction: column; margin: 0; background: var(--color-bg-page); }

        /* Header */
        .header {
            background: var(--color-gradient);
            color: white;
            padding: var(--space-3) var(--space-5);
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: var(--header-height);
            flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: var(--space-3); }
        .header h1 {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-semibold);
            display: flex;
            align-items: center;
            gap: var(--space-2);
            margin: 0;
            color: white;
        }
        .header-badge {
            background: var(--color-danger);
            color: white;
            border-radius: var(--radius-full);
            padding: 2px 7px;
            font-size: 11px;
            font-weight: var(--font-weight-bold);
            min-width: 18px;
            text-align: center;
        }
        .header-links { display: flex; gap: var(--space-2); align-items: center; }
        .header-links a {
            color: white;
            text-decoration: none;
            padding: var(--space-2) var(--space-3);
            border-radius: var(--radius-md);
            font-size: var(--font-size-sm);
            background: rgba(255,255,255,0.15);
            transition: background var(--transition-fast);
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
        }
        .header-links a:hover { background: rgba(255,255,255,0.25); }

        /* Main layout */
        .main { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--color-bg-card);
            border-right: 1px solid var(--color-border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header { padding: var(--space-3); border-bottom: 1px solid var(--color-border-light); }
        .search-wrapper {
            position: relative;
        }
        .search-wrapper .search-icon {
            position: absolute;
            left: var(--space-3);
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-text-muted);
            pointer-events: none;
        }
        .sidebar-header input {
            width: 100%;
            padding: var(--space-2) var(--space-3) var(--space-2) 36px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            font-size: var(--font-size-sm);
            font-family: var(--font-family);
            color: var(--color-text-primary);
            outline: none;
            transition: border-color var(--transition-fast);
        }
        .sidebar-header input:focus { border-color: var(--color-primary); }
        .sidebar-header input::placeholder { color: var(--color-text-muted); }

        .sidebar-tabs { display: flex; border-bottom: 1px solid var(--color-border-light); }
        .sidebar-tabs button {
            flex: 1;
            padding: var(--space-3);
            border: none;
            background: none;
            cursor: pointer;
            font-size: var(--font-size-sm);
            font-family: var(--font-family);
            color: var(--color-text-secondary);
            border-bottom: 2px solid transparent;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
        }
        .sidebar-tabs button:hover { color: var(--color-text-primary); background: var(--color-bg-hover); }
        .sidebar-tabs button.active { color: var(--color-primary); border-bottom-color: var(--color-primary); font-weight: var(--font-weight-semibold); }

        .conversation-list { flex: 1; overflow-y: auto; }

        /* Conversation Items */
        .section-divider {
            padding: var(--space-1) var(--space-4);
            font-size: var(--font-size-xs);
            font-weight: var(--font-weight-bold);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--color-border-light);
        }
        .section-divider.handoff { color: var(--color-danger); background: var(--color-danger-light); }
        .section-divider.recent { color: var(--color-text-muted); background: var(--color-bg-hover); }

        .conv-item {
            padding: var(--space-3) var(--space-4);
            border-bottom: 1px solid var(--color-border-light);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: var(--space-3);
            transition: background var(--transition-fast);
        }
        .conv-item:hover { background: var(--color-bg-hover); }
        .conv-item.selected { background: var(--color-primary-light); border-left: 3px solid var(--color-primary); }
        .conv-item.has-handoff { background: #fef8f8; }
        .conv-item.has-handoff.selected { background: var(--color-danger-light); border-left-color: var(--color-danger); }

        .conv-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: var(--font-weight-bold);
            font-size: var(--font-size-base);
            flex-shrink: 0;
        }
        .conv-avatar.line { background: var(--color-line); }
        .conv-avatar.facebook { background: var(--color-facebook); }

        .conv-info { flex: 1; min-width: 0; }
        .conv-name { font-weight: var(--font-weight-semibold); font-size: var(--font-size-base); color: var(--color-text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .conv-preview { font-size: var(--font-size-xs); color: var(--color-text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
        .conv-meta { text-align: right; flex-shrink: 0; }
        .conv-time { font-size: var(--font-size-xs); color: var(--color-text-muted); }
        .conv-handoff-badge { font-size: 10px; color: var(--color-danger); font-weight: var(--font-weight-bold); margin-top: 2px; display: flex; align-items: center; gap: 4px; justify-content: flex-end; }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-dot.online { background: var(--color-success); }
        .status-dot.pending { background: var(--color-danger); animation: pulse 1.5s infinite; }

        /* Chat panel */
        .chat-panel { flex: 1; display: flex; flex-direction: column; background: var(--color-bg-page); }
        .chat-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--color-text-muted);
            font-size: var(--font-size-md);
            gap: var(--space-3);
        }

        .chat-header {
            background: var(--color-bg-card);
            padding: var(--space-3) var(--space-5);
            border-bottom: 1px solid var(--color-border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .chat-user-info { display: flex; align-items: center; gap: var(--space-3); }
        .chat-user-name { font-weight: var(--font-weight-semibold); font-size: var(--font-size-md); }

        .chat-actions { display: flex; gap: var(--space-2); }

        /* Messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-4) var(--space-5);
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
        }
        .msg {
            max-width: 75%;
            padding: var(--space-3) var(--space-4);
            border-radius: var(--radius-lg);
            font-size: var(--font-size-base);
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
            animation: msg-in 0.25s ease forwards;
        }
        .msg-user {
            align-self: flex-start;
            background: var(--color-bg-card);
            color: var(--color-text-primary);
            border-bottom-left-radius: var(--radius-sm);
            box-shadow: var(--shadow-sm);
        }
        .msg-bot {
            align-self: flex-end;
            background: #dcf8c6;
            color: var(--color-text-primary);
            border-bottom-right-radius: var(--radius-sm);
        }
        .msg-admin {
            align-self: flex-end;
            background: #ede5f5;
            color: var(--color-text-primary);
            border-bottom-right-radius: var(--radius-sm);
        }
        .msg-time { font-size: 10px; color: var(--color-text-muted); margin-top: var(--space-1); }
        .msg-sender-label { font-size: 10px; font-weight: var(--font-weight-semibold); margin-bottom: 2px; }
        .msg-sender-label.bot { color: var(--color-success); }
        .msg-sender-label.admin { color: #7c3aed; }

        /* Handoff banner */
        .handoff-banner {
            background: var(--color-warning-light);
            border-bottom: 1px solid var(--color-warning);
            padding: var(--space-2) var(--space-4);
            text-align: center;
            font-size: var(--font-size-sm);
            color: #92400e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
        }

        /* Input */
        .chat-input-area {
            background: var(--color-bg-card);
            padding: var(--space-3) var(--space-5);
            border-top: 1px solid var(--color-border-light);
            display: flex;
            gap: var(--space-2);
            align-items: flex-end;
        }
        .chat-input-area textarea {
            flex: 1;
            padding: var(--space-3) var(--space-4);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            font-size: var(--font-size-base);
            font-family: var(--font-family);
            color: var(--color-text-primary);
            resize: none;
            outline: none;
            max-height: 120px;
            line-height: 1.4;
            transition: border-color var(--transition-fast);
        }
        .chat-input-area textarea:focus { border-color: var(--color-primary); }
        .chat-input-area textarea::placeholder { color: var(--color-text-muted); }

        /* Mobile toggle */
        .mobile-toggle {
            display: none;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: var(--space-1);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .mobile-toggle { display: flex; }
            .sidebar {
                width: 100%;
                position: absolute;
                z-index: 10;
                height: calc(100vh - var(--header-height));
                transform: translateX(-100%);
                transition: transform var(--transition-base);
            }
            .sidebar.open { transform: translateX(0); }
            .chat-panel { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <button class="mobile-toggle" onclick="toggleSidebar()" aria-label="Toggle menu">
                <i data-lucide="menu" class="icon"></i>
            </button>
            <h1>
                <i data-lucide="message-square" class="icon"></i>
                Admin Chat
                <span class="header-badge" id="headerBadge">0</span>
            </h1>
        </div>
        <div class="header-links">
            <a href="/dashboard"><i data-lucide="bar-chart-3" class="icon-sm"></i> Dashboard</a>
            <a href="/logout"><i data-lucide="log-out" class="icon-sm"></i> Logout</a>
        </div>
    </div>

    <div class="main">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="search-wrapper">
                    <i data-lucide="search" class="icon-xs search-icon"></i>
                    <input type="text" id="searchInput" placeholder="Search user..." oninput="filterConversations()" aria-label="Search conversations">
                </div>
            </div>
            <div class="sidebar-tabs">
                <button class="active" onclick="switchTab('all', this)">All</button>
                <button onclick="switchTab('handoff', this)">
                    <i data-lucide="alert-circle" class="icon-xs"></i>
                    Handoff <span class="header-badge" id="tabBadge" style="font-size:10px;">0</span>
                </button>
            </div>
            <div class="conversation-list" id="conversationList">
                <div class="skeleton-row"><div class="skeleton skeleton-avatar"></div><div class="skeleton-lines"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text" style="width:60%"></div></div></div>
                <div class="skeleton-row"><div class="skeleton skeleton-avatar"></div><div class="skeleton-lines"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text" style="width:60%"></div></div></div>
                <div class="skeleton-row"><div class="skeleton skeleton-avatar"></div><div class="skeleton-lines"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text" style="width:60%"></div></div></div>
            </div>
        </div>

        <div class="chat-panel" id="chatPanel">
            <div class="chat-empty" id="chatEmpty">
                <i data-lucide="message-square" class="icon-xl" style="color:var(--color-text-muted);opacity:0.5;"></i>
                Select a conversation to start
            </div>
        </div>
    </div>

    <script src="/static/js/utils.js"></script>
    <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
    <script>
        lucide.createIcons();

        var selectedUserId = null;
        var currentTab = 'all';
        var allConversations = { handoffs: [], recent: [] };
        var pollInterval = null;
        var lastHandoffCount = 0;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // ========== Sidebar ==========

        async function loadConversations() {
            try {
                var res = await fetch('/api/admin/conversations');
                if (res.status === 401) { window.location.href = '/login'; return; }
                allConversations = await res.json();
                renderSidebar();

                var countRes = await fetch('/api/admin/handoffs/count');
                var countData = await countRes.json();
                var pending = countData.pending || 0;
                document.getElementById('headerBadge').textContent = pending;
                document.getElementById('tabBadge').textContent = pending;

                if (pending > lastHandoffCount && lastHandoffCount >= 0) {
                    notifyNewHandoff(pending);
                }
                lastHandoffCount = pending;
            } catch (e) {
                console.error('Failed to load conversations:', e);
            }
        }

        function renderSidebar() {
            var list = document.getElementById('conversationList');
            var search = document.getElementById('searchInput').value.toLowerCase();
            var items = [];

            if (currentTab === 'handoff') {
                items = allConversations.handoffs || [];
            } else {
                items = [].concat(allConversations.handoffs || [], allConversations.recent || []);
            }

            if (search) {
                items = items.filter(function(c) {
                    return (c.display_name || '').toLowerCase().includes(search) ||
                        (c.user_id || '').toLowerCase().includes(search) ||
                        (c.last_message || '').toLowerCase().includes(search);
                });
            }

            if (!items.length) {
                list.innerHTML = '<div style="padding:40px;text-align:center;color:var(--color-text-muted);">No conversations</div>';
                return;
            }

            var html = '';
            var prevHandoff = null;
            items.forEach(function(c) {
                if (prevHandoff === null || prevHandoff !== c.has_handoff) {
                    if (c.has_handoff) {
                        html += '<div class="section-divider handoff">Handoff</div>';
                    } else if (currentTab === 'all') {
                        html += '<div class="section-divider recent">Recent</div>';
                    }
                    prevHandoff = c.has_handoff;
                }

                var selected = c.user_id === selectedUserId ? 'selected' : '';
                var handoff = c.has_handoff ? 'has-handoff' : '';
                var avatarClass = c.platform || 'line';
                var name = c.display_name || c.user_id.substring(0, 14);
                var preview = c.last_message || '';
                var time = formatTimeAgo(c.last_activity);
                var platformIcon = c.platform === 'facebook' ? 'FB' : 'L';

                html += '<div class="conv-item ' + selected + ' ' + handoff + '" onclick="selectConversation(\'' + c.user_id + '\')">'
                    + '<div class="conv-avatar ' + avatarClass + '">' + platformIcon + '</div>'
                    + '<div class="conv-info">'
                    + '<div class="conv-name">' + escapeHtml(name) + '</div>'
                    + '<div class="conv-preview">' + escapeHtml(preview) + '</div>'
                    + '</div>'
                    + '<div class="conv-meta">'
                    + '<div class="conv-time">' + time + '</div>'
                    + (c.has_handoff ? '<div class="conv-handoff-badge"><span class="status-dot pending"></span> Pending</div>' : '')
                    + '</div></div>';
            });

            list.innerHTML = html;
        }

        function switchTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.sidebar-tabs button').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            renderSidebar();
        }

        function filterConversations() { renderSidebar(); }

        // ========== Chat Panel ==========

        async function selectConversation(userId) {
            selectedUserId = userId;
            renderSidebar();
            await loadMessages();
            // Close sidebar on mobile
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        }

        async function loadMessages() {
            if (!selectedUserId) return;
            try {
                var res = await fetch('/api/admin/conversations/' + encodeURIComponent(selectedUserId) + '/messages?limit=50');
                if (res.status === 401) { window.location.href = '/login'; return; }
                var data = await res.json();
                renderChatPanel(data);
            } catch (e) {
                console.error('Failed to load messages:', e);
            }
        }

        function renderChatPanel(data) {
            var panel = document.getElementById('chatPanel');
            var messages = data.messages || [];
            var handoff = data.handoff;
            var platform = data.platform || 'line';
            var displayName = data.display_name || data.user_id;

            var html = '';

            // Chat header
            html += '<div class="chat-header">'
                + '<div class="chat-user-info">'
                + '<div class="conv-avatar ' + platform + '" style="width:36px;height:36px;font-size:13px;">'
                + (platform === 'facebook' ? 'FB' : 'L')
                + '</div><div>'
                + '<div class="chat-user-name">' + escapeHtml(displayName) + '</div>'
                + '<span class="badge ' + (platform === 'facebook' ? 'badge-facebook' : 'badge-line') + '">'
                + (platform === 'facebook' ? 'Facebook' : 'LINE') + '</span>'
                + '</div></div>'
                + '<div class="chat-actions">';

            if (handoff) {
                html += '<button class="btn btn-success btn-sm" onclick="resolveHandoff(' + handoff.id + ')"'
                    + (handoff.status === 'resolved' ? ' disabled' : '')
                    + '><i data-lucide="' + (handoff.status === 'resolved' ? 'check-circle' : 'check') + '" class="icon-xs"></i> '
                    + (handoff.status === 'resolved' ? 'Resolved' : 'Resolve')
                    + '</button>';
            }
            html += '</div></div>';

            // Handoff banner
            if (handoff && handoff.status !== 'resolved') {
                html += '<div class="handoff-banner">'
                    + '<i data-lucide="alert-triangle" class="icon-sm"></i> '
                    + 'Bot cannot answer — Admin response needed'
                    + (handoff.assigned_admin ? ' (Assigned: ' + escapeHtml(handoff.assigned_admin) + ')' : '')
                    + '</div>';
            }

            // Messages
            html += '<div class="chat-messages" id="chatMessages">';
            messages.forEach(function(msg) {
                var cls = msg.sender_type === 'user' ? 'msg-user' :
                    msg.sender_type === 'admin' ? 'msg-admin' : 'msg-bot';
                var label = '';
                if (msg.sender_type === 'bot') {
                    label = '<div class="msg-sender-label bot">Bot</div>';
                } else if (msg.sender_type === 'admin') {
                    label = '<div class="msg-sender-label admin">Admin' + (msg.admin_name ? ' (' + escapeHtml(msg.admin_name) + ')' : '') + '</div>';
                }
                var time = formatTime(msg.created_at);
                var content = escapeHtml(msg.content || '');

                html += '<div class="msg ' + cls + '">'
                    + label
                    + '<div>' + content.replace(/\n/g, '<br>') + '</div>'
                    + '<div class="msg-time">' + time + '</div>'
                    + '</div>';
            });
            html += '</div>';

            // Input area
            html += '<div class="chat-input-area">'
                + '<textarea id="messageInput" rows="1" placeholder="Type a message..." '
                + 'onkeydown="handleInputKey(event)" oninput="autoResize(this)" aria-label="Message input"></textarea>'
                + '<button class="btn btn-primary" id="btnSend" onclick="sendMessage()">'
                + '<i data-lucide="send" class="icon-sm"></i> Send</button>'
                + '</div>';

            panel.innerHTML = html;
            lucide.createIcons();

            // Scroll to bottom
            var chatMsgs = document.getElementById('chatMessages');
            if (chatMsgs) chatMsgs.scrollTop = chatMsgs.scrollHeight;

            // Focus input
            var input = document.getElementById('messageInput');
            if (input) input.focus();
        }

        async function sendMessage() {
            if (!selectedUserId) return;
            var input = document.getElementById('messageInput');
            var btn = document.getElementById('btnSend');
            var message = input.value.trim();
            if (!message) return;

            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader" class="icon-sm spin"></i> Sending...';
            lucide.createIcons();

            try {
                var res = await fetch('/api/admin/conversations/' + encodeURIComponent(selectedUserId) + '/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                if (res.ok) {
                    input.value = '';
                    autoResize(input);
                    await loadMessages();
                    showToast('Message sent!', 'success', 2000);
                } else {
                    var err = await res.json();
                    showToast('Send failed: ' + (err.detail || 'Unknown error'), 'error');
                }
            } catch (e) {
                showToast('Send failed: ' + e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="send" class="icon-sm"></i> Send';
                lucide.createIcons();
            }
        }

        async function resolveHandoff(handoffId) {
            showConfirm('Resolve this handoff? Bot will resume auto-reply for this user.', async function() {
                try {
                    var res = await fetch('/api/admin/handoffs/' + handoffId + '/resolve', { method: 'POST' });
                    if (res.ok) {
                        showToast('Handoff resolved!', 'success');
                        await loadMessages();
                        await loadConversations();
                    } else {
                        showToast('Failed to resolve handoff', 'error');
                    }
                } catch (e) {
                    showToast('Error: ' + e.message, 'error');
                }
            }, 'Resolve', 'Cancel');
        }

        function handleInputKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        // ========== Utilities ==========

        function escapeHtml(str) {
            if (!str) return '';
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatTimeAgo(isoStr) {
            if (!isoStr) return '';
            var date = new Date(isoStr);
            var now = new Date();
            var diff = Math.floor((now - date) / 1000);
            if (diff < 60) return 'now';
            if (diff < 3600) return Math.floor(diff / 60) + 'm';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h';
            return Math.floor(diff / 86400) + 'd';
        }

        function formatTime(isoStr) {
            if (!isoStr) return '';
            var date = new Date(isoStr);
            return date.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
        }

        function notifyNewHandoff(count) {
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification('Admin Chat', {
                    body: count + ' handoff(s) waiting',
                    icon: '/favicon.ico'
                });
            }
        }

        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }

        // ========== Polling ==========

        async function poll() {
            await loadConversations();
            if (selectedUserId) await loadMessages();
        }

        loadConversations();
        pollInterval = setInterval(poll, 5000);
    </script>
</body>
</html>
