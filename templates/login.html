<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ICP Ladda Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/design-system.css">
    <style>
        body {
            background: var(--color-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: var(--space-4);
        }

        .login-card {
            background: var(--color-bg-card);
            padding: var(--space-10);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: var(--space-8);
        }
        .login-icon {
            width: 52px;
            height: 52px;
            background: var(--color-primary-light);
            border-radius: var(--radius-lg);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: var(--space-4);
            color: var(--color-primary);
        }
        .login-header h1 {
            font-size: var(--font-size-xl);
            font-weight: var(--font-weight-bold);
            color: var(--color-text-primary);
            margin: 0 0 var(--space-1) 0;
        }
        .login-header p {
            color: var(--color-text-muted);
            font-size: var(--font-size-sm);
            margin: 0;
        }

        .form-group {
            margin-bottom: var(--space-5);
        }
        .form-group label {
            display: block;
            margin-bottom: var(--space-2);
            color: var(--color-text-secondary);
            font-weight: var(--font-weight-medium);
            font-size: var(--font-size-sm);
        }
        .input-wrapper {
            position: relative;
        }
        .form-group input {
            width: 100%;
            padding: var(--space-3) var(--space-4);
            border: 2px solid var(--color-border);
            border-radius: var(--radius-md);
            font-size: var(--font-size-base);
            font-family: var(--font-family);
            color: var(--color-text-primary);
            transition: border-color var(--transition-base);
            background: var(--color-bg-card);
            box-sizing: border-box;
        }
        .form-group input:focus {
            border-color: var(--color-primary);
            outline: none;
        }
        .form-group input::placeholder {
            color: var(--color-text-muted);
        }
        .password-wrapper input {
            padding-right: 44px;
        }
        .password-toggle {
            position: absolute;
            right: var(--space-3);
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--color-text-muted);
            padding: var(--space-1);
            display: flex;
            align-items: center;
        }
        .password-toggle:hover { color: var(--color-text-secondary); }

        .login-btn {
            width: 100%;
            padding: var(--space-3) var(--space-6);
            background: var(--color-primary);
            color: var(--color-text-inverse);
            border: none;
            border-radius: var(--radius-full);
            font-size: var(--font-size-md);
            font-weight: var(--font-weight-semibold);
            font-family: var(--font-family);
            cursor: pointer;
            transition: background var(--transition-base);
            margin-top: var(--space-3);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
        }
        .login-btn:hover { background: var(--color-primary-dark); }
        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error-message {
            background: var(--color-danger-light);
            color: var(--color-danger-dark);
            padding: var(--space-3) var(--space-4);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-5);
            font-size: var(--font-size-sm);
            display: none;
            align-items: center;
            gap: var(--space-2);
        }
        .error-message.show {
            display: flex;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon">
                <i data-lucide="lock" class="icon-lg"></i>
            </div>
            <h1>Admin Login</h1>
            <p>ICP Ladda Chatbot Management</p>
        </div>

        <div id="error" class="error-message" role="alert" aria-live="polite">
            <i data-lucide="alert-circle" class="icon-sm"></i>
            <span id="errorText"></span>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="username" aria-label="Username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password" aria-label="Password">
                    <button type="button" class="password-toggle" onclick="togglePassword()" aria-label="Toggle password visibility">
                        <i data-lucide="eye" id="eyeIcon" class="icon-sm"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <span id="loginText">Login</span>
            </button>
        </form>
    </div>

    <script src="/static/js/utils.js"></script>
    <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
    <script>
        lucide.createIcons();

        function togglePassword() {
            var input = document.getElementById('password');
            var icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        async function handleLogin(event) {
            event.preventDefault();

            var btn = document.getElementById('loginBtn');
            var btnText = document.getElementById('loginText');
            var errorEl = document.getElementById('error');
            var errorText = document.getElementById('errorText');

            // Loading state
            btn.disabled = true;
            btnText.innerHTML = '<i data-lucide="loader" class="icon-sm spin"></i> Logging in...';
            lucide.createIcons();
            errorEl.classList.remove('show');

            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;

            try {
                var response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password })
                });

                var data = await response.json();

                if (response.ok) {
                    btnText.innerHTML = '<i data-lucide="check" class="icon-sm"></i> Success!';
                    lucide.createIcons();
                    setTimeout(function() { window.location.href = '/dashboard'; }, 500);
                } else {
                    errorText.textContent = data.message || 'Login failed';
                    errorEl.classList.add('show');
                    btn.disabled = false;
                    btnText.textContent = 'Login';
                }
            } catch (error) {
                errorText.textContent = 'Connection error. Please try again.';
                errorEl.classList.add('show');
                btn.disabled = false;
                btnText.textContent = 'Login';
            }
        }
    </script>
</body>
</html>
