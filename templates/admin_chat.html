<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Chat - Chatbot Ladda</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }

        /* Header */
        .header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { font-size: 18px; font-weight: 600; }
        .header-links { display: flex; gap: 10px; align-items: center; }
        .header-links a { color: white; text-decoration: none; padding: 6px 14px; border-radius: 6px; font-size: 13px; background: rgba(255,255,255,0.15); transition: background 0.2s; }
        .header-links a:hover { background: rgba(255,255,255,0.3); }
        .badge { background: #ef4444; color: white; border-radius: 10px; padding: 2px 7px; font-size: 11px; font-weight: 700; margin-left: 4px; }

        /* Main layout */
        .main { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 320px; background: white; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; }
        .sidebar-header { padding: 12px; border-bottom: 1px solid #eee; }
        .sidebar-header input { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; outline: none; }
        .sidebar-header input:focus { border-color: #667eea; }
        .sidebar-tabs { display: flex; border-bottom: 1px solid #eee; }
        .sidebar-tabs button { flex: 1; padding: 10px; border: none; background: none; cursor: pointer; font-size: 13px; color: #666; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .sidebar-tabs button.active { color: #667eea; border-bottom-color: #667eea; font-weight: 600; }
        .conversation-list { flex: 1; overflow-y: auto; }

        .conv-item { padding: 12px 16px; border-bottom: 1px solid #f5f5f5; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: background 0.15s; }
        .conv-item:hover { background: #f8f9fa; }
        .conv-item.selected { background: #eef2ff; border-left: 3px solid #667eea; }
        .conv-item.has-handoff { background: #fef2f2; }
        .conv-item.has-handoff.selected { background: #fee2e2; border-left-color: #ef4444; }

        .conv-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 16px; flex-shrink: 0; }
        .conv-avatar.line { background: #06C755; }
        .conv-avatar.facebook { background: #0084FF; }
        .conv-info { flex: 1; min-width: 0; }
        .conv-name { font-weight: 600; font-size: 14px; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .conv-preview { font-size: 12px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
        .conv-meta { text-align: right; flex-shrink: 0; }
        .conv-time { font-size: 11px; color: #aaa; }
        .conv-handoff-badge { font-size: 10px; color: #ef4444; font-weight: 700; margin-top: 2px; }

        /* Chat panel */
        .chat-panel { flex: 1; display: flex; flex-direction: column; background: #f0f2f5; }
        .chat-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #999; font-size: 16px; }

        .chat-header { background: white; padding: 12px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
        .chat-user-info { display: flex; align-items: center; gap: 10px; }
        .chat-user-name { font-weight: 600; font-size: 16px; }
        .chat-user-platform { font-size: 12px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
        .chat-user-platform.line { background: #e6f9ed; color: #06C755; }
        .chat-user-platform.facebook { background: #e6f0ff; color: #0084FF; }
        .chat-actions { display: flex; gap: 8px; }
        .chat-actions button { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; }
        .btn-resolve { background: #10b981; color: white; }
        .btn-resolve:hover { background: #059669; }
        .btn-resolve:disabled { background: #ccc; cursor: not-allowed; }

        /* Messages */
        .chat-messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-wrap: break-word; position: relative; }
        .msg-user { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 4px; }
        .msg-bot { align-self: flex-end; background: #dcf8c6; color: #333; border-bottom-right-radius: 4px; }
        .msg-admin { align-self: flex-end; background: #e8d5f5; color: #333; border-bottom-right-radius: 4px; }
        .msg-time { font-size: 10px; color: #aaa; margin-top: 4px; }
        .msg-sender-label { font-size: 10px; font-weight: 600; margin-bottom: 2px; }
        .msg-sender-label.bot { color: #06C755; }
        .msg-sender-label.admin { color: #7c3aed; }

        /* Input */
        .chat-input-area { background: white; padding: 12px 20px; border-top: 1px solid #eee; display: flex; gap: 8px; align-items: flex-end; }
        .chat-input-area textarea { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; resize: none; outline: none; max-height: 120px; font-family: inherit; line-height: 1.4; }
        .chat-input-area textarea:focus { border-color: #667eea; }
        .btn-send { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; transition: background 0.2s; }
        .btn-send:hover { background: #5a6fd6; }
        .btn-send:disabled { background: #ccc; cursor: not-allowed; }

        /* Handoff banner */
        .handoff-banner { background: #fef3c7; border: 1px solid #fbbf24; padding: 8px 16px; text-align: center; font-size: 13px; color: #92400e; }

        /* Status indicator */
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-dot.online { background: #10b981; }
        .status-dot.pending { background: #ef4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { width: 100%; position: absolute; z-index: 10; height: calc(100vh - 50px); }
            .chat-panel { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Admin Chat <span class="badge" id="headerBadge">0</span></h1>
        <div class="header-links">
            <a href="/dashboard">Dashboard</a>
            <a href="/logout">Logout</a>
        </div>
    </div>

    <div class="main">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <input type="text" id="searchInput" placeholder="Search user..." oninput="filterConversations()">
            </div>
            <div class="sidebar-tabs">
                <button class="active" onclick="switchTab('all', this)">All</button>
                <button onclick="switchTab('handoff', this)">Handoff <span class="badge" id="tabBadge">0</span></button>
            </div>
            <div class="conversation-list" id="conversationList">
                <div style="padding: 40px; text-align: center; color: #999;">Loading...</div>
            </div>
        </div>

        <!-- Chat Panel -->
        <div class="chat-panel" id="chatPanel">
            <div class="chat-empty" id="chatEmpty">
                Select a conversation to start
            </div>
        </div>
    </div>

    <script>
        let selectedUserId = null;
        let currentTab = 'all';
        let allConversations = { handoffs: [], recent: [] };
        let pollInterval = null;
        let lastHandoffCount = 0;

        // ========== Sidebar ==========

        async function loadConversations() {
            try {
                const res = await fetch('/api/admin/conversations?hours=48');
                if (res.status === 401) { window.location.href = '/login'; return; }
                allConversations = await res.json();
                renderSidebar();
                // Badge
                const countRes = await fetch('/api/admin/handoffs/count');
                const countData = await countRes.json();
                const pending = countData.pending || 0;
                document.getElementById('headerBadge').textContent = pending;
                document.getElementById('tabBadge').textContent = pending;

                // Browser notification for new handoffs
                if (pending > lastHandoffCount && lastHandoffCount >= 0) {
                    notifyNewHandoff(pending);
                }
                lastHandoffCount = pending;
            } catch (e) {
                console.error('Failed to load conversations:', e);
            }
        }

        function renderSidebar() {
            const list = document.getElementById('conversationList');
            const search = document.getElementById('searchInput').value.toLowerCase();

            let items = [];
            if (currentTab === 'handoff') {
                items = allConversations.handoffs || [];
            } else {
                items = [...(allConversations.handoffs || []), ...(allConversations.recent || [])];
            }

            // Filter by search
            if (search) {
                items = items.filter(c =>
                    (c.display_name || '').toLowerCase().includes(search) ||
                    (c.user_id || '').toLowerCase().includes(search) ||
                    (c.last_message || '').toLowerCase().includes(search)
                );
            }

            if (!items.length) {
                list.innerHTML = '<div style="padding:40px;text-align:center;color:#999;">No conversations</div>';
                return;
            }

            let html = '';
            let prevHandoff = null;
            items.forEach(c => {
                // Section divider
                if (prevHandoff === null || prevHandoff !== c.has_handoff) {
                    if (c.has_handoff) {
                        html += '<div style="padding:6px 16px;font-size:11px;color:#ef4444;font-weight:700;background:#fef2f2;border-bottom:1px solid #fee2e2;">HANDOFF</div>';
                    } else if (currentTab === 'all') {
                        html += '<div style="padding:6px 16px;font-size:11px;color:#888;font-weight:700;background:#f9fafb;border-bottom:1px solid #eee;">RECENT</div>';
                    }
                    prevHandoff = c.has_handoff;
                }

                const selected = c.user_id === selectedUserId ? 'selected' : '';
                const handoff = c.has_handoff ? 'has-handoff' : '';
                const avatarClass = c.platform || 'line';
                const avatarLetter = (c.display_name || c.user_id || '?')[0].toUpperCase();
                const name = c.display_name || c.user_id.substring(0, 14);
                const preview = c.last_message || '';
                const time = formatTimeAgo(c.last_activity);
                const platformIcon = c.platform === 'facebook' ? 'FB' : 'L';

                html += `<div class="conv-item ${selected} ${handoff}" onclick="selectConversation('${c.user_id}')">
                    <div class="conv-avatar ${avatarClass}">${platformIcon}</div>
                    <div class="conv-info">
                        <div class="conv-name">${escapeHtml(name)}</div>
                        <div class="conv-preview">${escapeHtml(preview)}</div>
                    </div>
                    <div class="conv-meta">
                        <div class="conv-time">${time}</div>
                        ${c.has_handoff ? '<div class="conv-handoff-badge"><span class="status-dot pending"></span> Pending</div>' : ''}
                    </div>
                </div>`;
            });

            list.innerHTML = html;
        }

        function switchTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.sidebar-tabs button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderSidebar();
        }

        function filterConversations() {
            renderSidebar();
        }

        // ========== Chat Panel ==========

        async function selectConversation(userId) {
            selectedUserId = userId;
            renderSidebar(); // Update selected state
            await loadMessages();
        }

        async function loadMessages() {
            if (!selectedUserId) return;

            try {
                const res = await fetch(`/api/admin/conversations/${encodeURIComponent(selectedUserId)}/messages?limit=50`);
                if (res.status === 401) { window.location.href = '/login'; return; }
                const data = await res.json();
                renderChatPanel(data);
            } catch (e) {
                console.error('Failed to load messages:', e);
            }
        }

        function renderChatPanel(data) {
            const panel = document.getElementById('chatPanel');
            const messages = data.messages || [];
            const handoff = data.handoff;
            const platform = data.platform || 'line';
            const displayName = data.display_name || data.user_id;

            let html = '';

            // Chat header
            html += `<div class="chat-header">
                <div class="chat-user-info">
                    <div class="conv-avatar ${platform}" style="width:36px;height:36px;font-size:14px;">
                        ${platform === 'facebook' ? 'FB' : 'L'}
                    </div>
                    <div>
                        <div class="chat-user-name">${escapeHtml(displayName)}</div>
                        <span class="chat-user-platform ${platform}">${platform === 'facebook' ? 'Facebook' : 'LINE'}</span>
                    </div>
                </div>
                <div class="chat-actions">
                    ${handoff ? `<button class="btn-resolve" onclick="resolveHandoff(${handoff.id})" ${handoff.status === 'resolved' ? 'disabled' : ''}>
                        ${handoff.status === 'resolved' ? 'Resolved' : 'Resolve'}
                    </button>` : ''}
                </div>
            </div>`;

            // Handoff banner
            if (handoff && handoff.status !== 'resolved') {
                html += `<div class="handoff-banner">
                    Bot cannot answer — Admin response needed
                    ${handoff.assigned_admin ? ` (Assigned: ${escapeHtml(handoff.assigned_admin)})` : ''}
                </div>`;
            }

            // Messages
            html += '<div class="chat-messages" id="chatMessages">';
            messages.forEach(msg => {
                const cls = msg.sender_type === 'user' ? 'msg-user' :
                           msg.sender_type === 'admin' ? 'msg-admin' : 'msg-bot';
                const label = msg.sender_type === 'bot' ? '<div class="msg-sender-label bot">Bot</div>' :
                             msg.sender_type === 'admin' ? `<div class="msg-sender-label admin">Admin${msg.admin_name ? ' (' + escapeHtml(msg.admin_name) + ')' : ''}</div>` : '';
                const time = formatTime(msg.created_at);
                const content = escapeHtml(msg.content || '');

                html += `<div class="msg ${cls}">
                    ${label}
                    <div>${content.replace(/\n/g, '<br>')}</div>
                    <div class="msg-time">${time}</div>
                </div>`;
            });
            html += '</div>';

            // Input area
            html += `<div class="chat-input-area">
                <textarea id="messageInput" rows="1" placeholder="Type a message..."
                    onkeydown="handleInputKey(event)"
                    oninput="autoResize(this)"></textarea>
                <button class="btn-send" id="btnSend" onclick="sendMessage()">Send</button>
            </div>`;

            panel.innerHTML = html;

            // Scroll to bottom
            const chatMsgs = document.getElementById('chatMessages');
            if (chatMsgs) chatMsgs.scrollTop = chatMsgs.scrollHeight;

            // Focus input
            const input = document.getElementById('messageInput');
            if (input) input.focus();
        }

        async function sendMessage() {
            if (!selectedUserId) return;
            const input = document.getElementById('messageInput');
            const btn = document.getElementById('btnSend');
            const message = input.value.trim();
            if (!message) return;

            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const res = await fetch(`/api/admin/conversations/${encodeURIComponent(selectedUserId)}/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                if (res.ok) {
                    input.value = '';
                    autoResize(input);
                    await loadMessages();
                } else {
                    const err = await res.json();
                    alert('Send failed: ' + (err.detail || 'Unknown error'));
                }
            } catch (e) {
                alert('Send failed: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send';
            }
        }

        async function resolveHandoff(handoffId) {
            if (!confirm('Resolve this handoff? Bot will resume auto-reply for this user.')) return;

            try {
                const res = await fetch(`/api/admin/handoffs/${handoffId}/resolve`, { method: 'POST' });
                if (res.ok) {
                    await loadMessages();
                    await loadConversations();
                } else {
                    alert('Failed to resolve');
                }
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        function handleInputKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        // ========== Utilities ==========

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatTimeAgo(isoStr) {
            if (!isoStr) return '';
            const date = new Date(isoStr);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);
            if (diff < 60) return 'now';
            if (diff < 3600) return Math.floor(diff / 60) + 'm';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h';
            return Math.floor(diff / 86400) + 'd';
        }

        function formatTime(isoStr) {
            if (!isoStr) return '';
            const date = new Date(isoStr);
            return date.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
        }

        function notifyNewHandoff(count) {
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification('Admin Chat', {
                    body: `${count} handoff(s) waiting`,
                    icon: '/favicon.ico'
                });
            }
        }

        // Request notification permission
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }

        // ========== Polling ==========

        async function poll() {
            await loadConversations();
            if (selectedUserId) {
                await loadMessages();
            }
        }

        // Initial load
        loadConversations();

        // Poll every 5 seconds
        pollInterval = setInterval(poll, 5000);
    </script>
</body>
</html>
